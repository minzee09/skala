<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="nums" value="1,2,3,4,5" />
    <script>
        let nums = document.querySelector("#nums");
        console.log('1', nums);
        console.log('2', nums.value);
        let numArr = nums.value.split(",");
        console.log('3', numArr);
        console.log('4', typeof numArr[0]);

        console.log('5', Math.max(...numArr));

        console.log('6', numArr.map(Number).join(' '));
    </script>
</body>
</html>
